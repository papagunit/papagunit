<svg width="100%" height="250" viewBox="0 0 1200 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#36BCF7" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e5e7eb" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="15" />
  <rect width="100%" height="100%" fill="url(#grid)" rx="15" />

  <!-- Ambient Light Orbs (Simulating Lighting) -->
  <circle cx="15%" cy="0%" r="250" fill="#36BCF7" opacity="0.15" style="filter: blur(80px);" />
  <circle cx="85%" cy="100%" r="250" fill="#10b981" opacity="0.1" style="filter: blur(80px);" />

  <!-- Abstract Tech Line / Wave -->
  <path d="M 0 200 C 300 250, 400 100, 800 150 C 1000 175, 1100 150, 1200 220" fill="none" stroke="url(#accent1)" stroke-width="2" opacity="0.5" filter="url(#glow)" />
  <path d="M 0 180 C 300 230, 450 120, 850 160 C 1000 185, 1100 160, 1200 210" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3" filter="url(#glow)" />

  <!-- Text Elements -->
  <text x="50%" y="45%" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="85" font-weight="800" fill="url(#textGrad)" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">papagunit</text>
  
  <rect x="35%" y="65%" width="30%" height="40" rx="20" fill="rgba(54, 188, 247, 0.1)" stroke="rgba(54, 188, 247, 0.3)" stroke-width="1" />
  
  <text x="50%" y="73%" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#36BCF7" text-anchor="middle" dominant-baseline="middle" letter-spacing="3">CONSULTANT &amp; SOLUTIONS ARCHITECT</text>
</svg>
